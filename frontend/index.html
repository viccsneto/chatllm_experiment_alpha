<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ChatLLM Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css"
    />
    <style>
      :root {
        --bg-page: #ffffff;
        --text: #0d0d0d;
        --muted: #8e8ea0;
        --accent: #1a1a1a;
        --accent-hover: #404040;
        --user-bubble: #f4f4f4;
        --border: #e5e5e5;
        --composer-bg: #ffffff;
        --composer-border: #d9d9d9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: var(--bg-page);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .app-shell {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .app-header {
        flex-shrink: 0;
        padding: 12px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-left { display: flex; align-items: center; gap: 8px; }
      .brand { font-weight: 600; font-size: 0.95rem; color: var(--text); }
      .header-right { display: flex; align-items: center; gap: 8px; }
      .btn-login, .btn-logout {
        font: inherit;
        font-size: 0.85rem;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        color: var(--text);
        transition: background 120ms ease;
      }
      .btn-login:hover, .btn-logout:hover { background: var(--user-bubble); }
      .auth-info { display: flex; align-items: center; gap: 8px; }
      .user-email { font-size: 0.85rem; color: var(--muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .auth-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-modal {
        background: #fff;
        border-radius: 16px;
        padding: 24px 32px 32px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        position: relative;
      }
      .auth-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .auth-modal-header h2 {
        margin: 0;
        font-size: 1.2rem;
      }
      .auth-modal form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .auth-modal input {
        font: inherit;
        font-size: 0.95rem;
        padding: 10px 14px;
        border: 1px solid var(--composer-border);
        border-radius: 10px;
        outline: none;
      }
      .auth-modal input:focus {
        border-color: var(--accent);
      }
      .auth-modal button[type="submit"] {
        font: inherit;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background 120ms ease;
      }
      .auth-modal button[type="submit"]:hover {
        background: var(--accent-hover);
      }
      .auth-modal button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .auth-error {
        background: #fff5f5;
        color: #c53030;
        font-size: 0.85rem;
        padding: 8px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .auth-switch {
        font-size: 0.85rem;
        text-align: center;
        margin: 12px 0 0;
      }
      .auth-switch a {
        color: var(--accent);
        text-decoration: none;
      }
      .auth-switch a:hover {
        text-decoration: underline;
      }
      .auth-modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        line-height: 1;
        color: var(--muted);
        cursor: pointer;
        padding: 0;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }
      .auth-modal-close:hover {
        background: var(--user-bubble);
        color: var(--text);
      }

      .app-body {
        flex: 1;
        min-height: 0;
        display: flex;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(26, 26, 26, 0.03), transparent 32%),
          linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
      }

      .btn-sidebar-toggle {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }
      .btn-sidebar-toggle:hover {
        background: var(--user-bubble);
        border-color: #cfcfcf;
        transform: translateY(-1px);
      }

      .sidebar {
        width: 300px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: rgba(250, 250, 250, 0.96);
        display: flex;
        flex-direction: column;
        padding: 16px 14px;
        gap: 12px;
        overflow: hidden;
      }
      .sidebar-header {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 2px;
      }
      .btn-new-session {
        width: 100%;
        border: 1px solid #d7d7d7;
        background: linear-gradient(180deg, #ffffff 0%, #f6f6f6 100%);
        color: var(--text);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .btn-new-session:hover {
        transform: translateY(-1px);
        border-color: #bdbdbd;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
      }
      .sidebar-sessions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        min-height: 0;
        padding-right: 2px;
      }
      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
        padding: 11px 12px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: #fff;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }
      .sidebar-item:hover {
        background: #f7f7f7;
        border-color: #e6e6e6;
        transform: translateY(-1px);
      }
      .sidebar-item.active {
        border-color: #d0d0d0;
        background: #f3f3f3;
      }
      .sidebar-item-title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.92rem;
      }
      .sidebar-item-delete {
        flex-shrink: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.1rem;
        line-height: 1;
        width: 24px;
        height: 24px;
        border-radius: 999px;
      }
      .sidebar-item-delete:hover {
        background: #fff0f0;
        color: #c0392b;
      }
      .sidebar-empty {
        padding: 12px;
        border: 1px dashed #dedede;
        border-radius: 12px;
        color: var(--muted);
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.72);
      }

      .app-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .messages {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 32px 16px 16px;
      }

      .messages-inner {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .bubble {
        line-height: 1.65;
        word-break: break-word;
        overflow-wrap: anywhere;
        animation: slideUp 180ms ease-out;
        padding: 20px 0;
      }

      .bubble + .bubble {
        border-top: none;
      }

      .bubble.assistant {
        align-self: flex-start;
        width: 100%;
        font-size: 1rem;
        color: var(--text);
      }

      .bubble.user {
        align-self: flex-end;
        background: var(--user-bubble);
        padding: 12px 18px;
        border-radius: 18px;
        max-width: 78%;
        font-size: 1rem;
      }

      .bubble pre {
        margin: 12px 0;
        padding: 16px;
        border-radius: 12px;
        overflow-x: auto;
        background: #f4f4f4;
        border: 1px solid var(--border);
        font-size: 0.875rem;
      }

      .code-block-wrap {
        position: relative;
      }

      .code-copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(17, 24, 39, 0.75);
        color: #f9fafb;
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 0.73rem;
        cursor: pointer;
        z-index: 2;
      }

      .code-copy-btn:hover {
        background: rgba(31, 41, 55, 0.95);
      }

      .bubble code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.875em;
      }

      .bubble :not(pre) > code {
        padding: 2px 5px;
        border-radius: 4px;
        background: #f4f4f4;
        border: 1px solid var(--border);
        font-size: 0.875em;
      }

      .composer-wrap {
        flex-shrink: 0;
        padding: 8px 16px 20px;
      }

      .note {
        max-width: 720px;
        margin: 0 auto 8px;
        padding: 4px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .error {
        color: #c0392b;
      }

      .warning-banner {
        flex-shrink: 0;
        text-align: center;
        padding: 8px 16px;
        color: #e53e3e;
        font-weight: 600;
        font-size: 0.85rem;
        background: #fff5f5;
        border-bottom: 1px solid #fed7d7;
      }

      .composer {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--composer-bg);
        border: 1px solid var(--composer-border);
        border-radius: 28px;
        padding: 8px 10px 8px 18px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      .composer:focus-within {
        border-color: #b0b0b0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      }

      .composer input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 6px 0;
        font: inherit;
        font-size: 1rem;
        color: var(--text);
        outline: none;
      }

      .composer input::placeholder {
        color: var(--muted);
      }

      .composer button {
        flex-shrink: 0;
        border: 0;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background 120ms ease, transform 100ms ease;
      }

      .composer button:hover:not(:disabled) {
        background: var(--accent-hover);
        transform: scale(1.05);
      }

      .composer button:disabled {
        background: #d9d9d9;
        cursor: not-allowed;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 640px) {
        .bubble.user { max-width: 90%; }
        .messages { padding: 20px 12px 12px; }
        .composer-wrap { padding: 8px 12px 16px; }
        .sidebar { width: 260px; }
        .app-header { padding: 12px 16px; }
        .brand { font-size: 0.9rem; }
      }    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    ></script>
    <script type="text/babel" src="/frontend/src/api.js"></script>
    <script type="text/babel" src="/frontend/src/AuthModal.jsx"></script>
    <script type="text/babel" src="/frontend/src/MessageContent.jsx"></script>
    <script type="text/babel" src="/frontend/src/Composer.jsx"></script>
    <script type="text/babel" src="/frontend/src/App.jsx"></script>
  </body>
</html>
